<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — CaféMaven</title>
  <link rel="stylesheet" href="../styles/base.css" />
  <link rel="stylesheet" href="../styles/auth.css" />
</head>
<body>
  <div id="toast-container"></div>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>Café<span>Maven</span></h1>
        <p>Join the community</p>
      </div>
      <h2 class="auth-title">Create account</h2>
      <p class="auth-subtitle">Start your CaféMaven experience</p>

      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input id="name" type="text" class="form-input" placeholder="Jane Smith" />
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input id="email" type="text" class="form-input" placeholder="you@example.com" />
        <!-- type="text" intentionally — we validate manually for better error messages -->
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input id="password" type="password" class="form-input" placeholder="Min 6 characters" />
      </div>
      <button class="btn btn-primary btn-full" id="reg-btn" onclick="doRegister()">Create Account</button>

      <div class="auth-switch">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>

  <script src="../scripts/api.js"></script>
  <script src="../scripts/auth.js"></script>
  <script src="../scripts/utils.js"></script>
  <script>
    redirectIfLoggedIn();

    function isValidEmail(email) {
      // Strict check: must have text @ text . text, no spaces
      return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email);
    }

    async function doRegister() {
      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('reg-btn');

      // ── Validation ──────────────────────────────────────
      if (!name) return showToast('Please enter your full name', 'error');
      if (!email) return showToast('Please enter your email', 'error');
      if (!isValidEmail(email)) return showToast('Enter a valid email like you@example.com', 'error');
      if (!password) return showToast('Please enter a password', 'error');
      if (password.length < 6) return showToast('Password must be at least 6 characters', 'error');

      // ── Submit ───────────────────────────────────────────
      btn.disabled = true;
      btn.textContent = 'Creating…';
      try {
        await Auth.register(name, email, password);
        showToast('Account created! Redirecting...', 'success');
        setTimeout(() => window.location.replace('login.html'), 1500);
      } catch (e) {
        showToast(e.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }
  </script>
</body>
</html>
