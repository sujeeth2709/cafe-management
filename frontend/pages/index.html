<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — CaféMaven</title>
  <link rel="stylesheet" href="../../styles/base.css" />
  <link rel="stylesheet" href="../../styles/navbar.css" />
  <link rel="stylesheet" href="../../styles/admin.css" />
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  
  <style>
    .cashflow-table table { width:100%; border-collapse:collapse; }
    .cashflow-table th, .cashflow-table td { padding:10px 14px; text-align:left; border-bottom:1px solid var(--border); font-size:13px; }
    .cashflow-table th { font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-muted); }
    .cashflow-today { background:var(--surface-alt, #1a1a2e); border-radius:8px; }
    .revenue-positive { color:#4ade80; font-weight:700; }
    .summary-bar { display:flex; gap:16px; margin-bottom:24px; flex-wrap:wrap; }
    .summary-pill { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 18px; flex:1; min-width:140px; }
    .summary-pill .label { font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-muted); margin-bottom:4px; }
    .summary-pill .value { font-size:1.4rem; font-weight:700; }
    
    /* Boxed Menu Items for Admin Modal */
    .menu-box-item {
      display:flex; align-items:center; justify-content:space-between; 
      padding:14px; background:var(--surface2); 
      border:1px solid rgba(201,150,62,0.2); 
      border-radius:12px; margin-bottom: 8px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .menu-box-item:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 12px rgba(201,150,62,0.1);
    }

    /* Admin Menu Cards Grid */
    .admin-menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }
    .admin-menu-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      transition: box-shadow 0.18s, border-color 0.18s;
    }
    .admin-menu-card:hover {
      border-color: rgba(201,150,62,0.35);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }
    .admin-menu-card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .admin-menu-cat {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      font-weight: 700;
      color: var(--accent);
      background: var(--accent-dim);
      border-radius: 4px;
      padding: 2px 8px;
    }
    .admin-menu-id {
      font-size: 11px;
      color: var(--text-muted);
    }
    .admin-menu-name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }
    .admin-menu-desc {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.4;
      flex: 1;
    }
    .admin-menu-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 4px 0;
    }
    .admin-menu-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .admin-menu-price {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
    }
    .admin-avail-badge {
      font-size: 10px;
      font-weight: 600;
      border-radius: 4px;
      padding: 2px 8px;
    }
    .avail-yes { color: #4ade80; background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.25); }
    .avail-no  { color: var(--danger); background: rgba(224,85,85,0.1); border: 1px solid rgba(224,85,85,0.25); }
  </style>
</head>
<body>
  <div id="toast-container"></div>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="../index.html" class="navbar-brand">Café<span>Maven</span> <span style="font-size:11px;color:var(--accent);margin-left:6px;font-family:var(--font-body);text-transform:uppercase;letter-spacing:.08em">Admin</span></a>
      <div class="navbar-right">
        <div id="nav-user-area"></div>
      </div>
    </div>
  </nav>

  <div style="padding-top:var(--nav-h)">
    <div class="admin-layout">
      <aside class="admin-sidebar">
        <div class="sidebar-label">Overview</div>
        <div class="sidebar-link active" onclick="showSection('dashboard', event)">📊 Dashboard</div>
        <div class="sidebar-link" onclick="showSection('cashflow', event)">💰 Cash Flow</div>
        <div class="sidebar-label">Management</div>
        <div class="sidebar-link" onclick="showSection('menu', event)">🍽 Menu Items</div>
        <div class="sidebar-link" onclick="showSection('orders', event)">📦 Orders</div>
        <div class="sidebar-link" onclick="showSection('reservations', event)">📅 Reservations</div>
        <div class="sidebar-label">Account</div>
        <div class="sidebar-link" onclick="logout()">🚪 Sign Out</div>
      </aside>

      <main class="admin-main">

        <div class="admin-section active" id="section-dashboard">
          <div class="section-header">
            <h2 class="section-title">Dashboard</h2>
            <button class="btn btn-secondary btn-sm" onclick="loadDashboard()">↻ Refresh</button>
          </div>
          <div class="stat-cards" id="stat-cards"><div class="spinner"></div></div>
        </div>

        <div class="admin-section" id="section-cashflow">
          <div class="section-header">
            <h2 class="section-title">💰 Cash Flow Log</h2>
            <button class="btn btn-secondary btn-sm" onclick="loadCashflow()">↻ Refresh</button>
          </div>
          <div id="cashflow-summary" class="summary-bar"></div>
          <div id="cashflow-table" class="cashflow-table"><div class="spinner"></div></div>
        </div>

        <div class="admin-section" id="section-menu">
          <div class="section-header">
            <h2 class="section-title">Menu Items</h2>
            <button class="btn btn-primary btn-sm" onclick="openMenuModal()">+ Add Item</button>
          </div>
          <div id="menu-table"><div class="spinner"></div></div>
        </div>

        <div class="admin-section" id="section-orders">
          <div class="section-header" style="justify-content: flex-start; gap: 24px;">
            <h2 class="section-title">All Orders</h2>
            <div style="display:flex;gap:12px">
              <button class="btn btn-primary btn-sm" style="box-shadow: 0 0 14px var(--accent); font-weight: 700; border: 1px solid var(--accent-light);" onclick="openNewOrderModal()">+ New Order</button>
              <button class="btn btn-sm" style="background: var(--info); color: #fff; box-shadow: 0 0 10px rgba(91,155,213,0.5); font-weight: 600;" onclick="loadOrders()">↻ Refresh</button>
            </div>
          </div>
          <div id="orders-table"><div class="spinner"></div></div>
        </div>

        <div class="admin-section" id="section-reservations">
          <div class="section-header">
            <h2 class="section-title">Reservations</h2>
            <div style="display:flex;gap:8px">
              <button class="btn btn-primary btn-sm" onclick="openNewReservationModal()">+ New Reservation</button>
              <button class="btn btn-secondary btn-sm" onclick="loadReservations()">↻ Refresh</button>
            </div>
          </div>
          <div id="reservations-table"><div class="spinner"></div></div>
        </div>

      </main>
    </div>
  </div>

  <div class="modal-overlay" id="menu-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-title">Add Menu Item</h3>
        <button class="modal-close" onclick="closeMenuModal()">✕</button>
      </div>
      <div class="form-group">
        <label class="form-label">Name</label>
        <input id="m-name" class="form-input" placeholder="Espresso" />
      </div>
      <div class="form-group">
        <label class="form-label">Category</label>
        <input id="m-category" class="form-input" placeholder="Coffee" />
      </div>
      <div class="form-group">
        <label class="form-label">Price (₹)</label>
        <input id="m-price" type="number" class="form-input" placeholder="150" />
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea id="m-desc" class="form-textarea" placeholder="Short description…"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Image URL (optional)</label>
        <input id="m-img" class="form-input" placeholder="https://…" />
      </div>
      <div class="form-group" style="display:flex;align-items:center;gap:10px">
        <input id="m-avail" type="checkbox" checked style="width:16px;height:16px" />
        <label class="form-label" style="margin:0">Available</label>
      </div>
      <input type="hidden" id="m-id" value="" />
      <button class="btn btn-primary btn-full" id="modal-save-btn" onclick="saveMenuItem()">Save Item</button>
    </div>
  </div>

  <div class="modal-overlay" id="new-order-modal">
    <div class="modal" style="max-width:520px;max-height:85vh;overflow-y:auto">
      <div class="modal-header">
        <h3 class="modal-title">New Order</h3>
        <button class="modal-close" onclick="closeNewOrderModal()">✕</button>
      </div>
      <div class="form-group">
        <label class="form-label">🪑 Table Number (1–20)</label>
        <input id="no-table" type="number" class="form-input" min="1" max="20" placeholder="e.g. 5" />
      </div>
      
      <div class="form-group">
        <label class="form-label">Search Menu</label>
        <input id="no-search" type="text" class="form-input" placeholder="🔍 Find items..." onkeyup="filterNewOrderMenu()" style="border-color: var(--accent);" />
      </div>

      <div class="form-group">
        <label class="form-label">Menu Items</label>
        <div id="no-menu-list" style="display:flex;flex-direction:column;gap:8px;margin-top:6px"><div class="spinner"></div></div>
      </div>
      <div style="margin-top:16px;padding:12px;background:var(--surface);border-radius:8px;border:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;font-weight:600">
          <span>Total</span><span id="no-total">₹0.00</span>
        </div>
        <div id="no-selected-items" style="margin-top:8px;font-size:12px;color:var(--text-muted)">No items selected</div>
      </div>
      <button class="btn btn-primary btn-full" style="margin-top:16px" id="no-submit-btn" onclick="submitNewOrder()">Place Order</button>
    </div>
  </div>

  <div class="modal-overlay" id="new-res-modal">
    <div class="modal" style="max-width:420px">
      <div class="modal-header">
        <h3 class="modal-title">New Reservation</h3>
        <button class="modal-close" onclick="closeNewReservationModal()">✕</button>
      </div>
      <div class="form-group">
        <label class="form-label">Date</label>
        <input id="nr-date" type="text" class="form-input" placeholder="Select Date" />
      </div>
      <div class="form-group">
        <label class="form-label">Time</label>
        <input id="nr-time" type="text" class="form-input" placeholder="Select Time" />
      </div>
      <div class="form-group">
        <label class="form-label">Number of Guests</label>
        <input id="nr-guests" type="number" class="form-input" min="1" max="20" placeholder="2" />
      </div>
      <div class="form-group">
        <label class="form-label">🪑 Table Number (1–20)</label>
        <input id="nr-table" type="number" class="form-input" min="1" max="20" placeholder="e.g. 5" />
      </div>
      <button class="btn btn-primary btn-full" style="margin-top:4px" id="nr-submit-btn" onclick="submitNewReservation()">Book Table</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  
  <script src="../../scripts/api.js"></script>
  <script src="../../scripts/auth.js"></script>
  <script src="../../scripts/utils.js"></script>
  <script>
    requireAuth();
    initNavbar();
    loadDashboard();

    // Initialize custom date and time pickers
    flatpickr("#nr-date", {
      minDate: "today",
      dateFormat: "Y-m-d",
      disableMobile: "true"
    });
    flatpickr("#nr-time", {
      enableTime: true,
      noCalendar: true,
      dateFormat: "H:i",
      disableMobile: "true"
    });

    function showSection(name, e) {
      document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
      document.getElementById(`section-${name}`).classList.add('active');
      if (e && e.target) e.target.classList.add('active');
      if (name === 'dashboard') loadDashboard();
      else if (name === 'cashflow') loadCashflow();
      else if (name === 'menu') loadMenuAdmin();
      else if (name === 'orders') loadOrders();
      else if (name === 'reservations') loadReservations();
    }

    // ── Dashboard ──────────────────────────────────────
    async function loadDashboard() {
      try {
        const data = await Admin.dashboard();
        document.getElementById('stat-cards').innerHTML = `
          <div class="stat-card">
            <div class="stat-label">Total Revenue</div>
            <div class="stat-value">${formatCurrency(data.total_revenue)}</div>
            <div class="stat-sub">From delivered orders</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Total Orders</div>
            <div class="stat-value">${data.total_orders}</div>
            <div class="stat-sub">${data.pending_orders} pending</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Reservations</div>
            <div class="stat-value">${data.total_reservations}</div>
            <div class="stat-sub">${data.pending_reservations} pending</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Customers</div>
            <div class="stat-value">${data.total_customers}</div>
            <div class="stat-sub">Registered users</div>
          </div>
        `;
      } catch (e) { showToast(e.message, 'error'); }
    }

    // ── Cash Flow ──────────────────────────────────────
    async function loadCashflow() {
      const tableEl = document.getElementById('cashflow-table');
      const summaryEl = document.getElementById('cashflow-summary');
      tableEl.innerHTML = `<div class="spinner"></div>`;
      summaryEl.innerHTML = '';
      try {
        const rows = await Admin.cashflow();
        if (!rows.length) {
          tableEl.innerHTML = `<p style="color:var(--text-muted)">No order data yet. Orders will appear here once placed.</p>`;
          return;
        }

        // Summary pills
        const totalRevenue = rows.reduce((s, r) => s + r.revenue, 0);
        const totalOrders = rows.reduce((s, r) => s + r.order_count, 0);
        const today = new Date().toISOString().split('T')[0];
        const todayRow = rows.find(r => r.date === today);

        summaryEl.innerHTML = `
          <div class="summary-pill">
            <div class="label">All-time Revenue</div>
            <div class="value revenue-positive">${formatCurrency(totalRevenue)}</div>
          </div>
          <div class="summary-pill">
            <div class="label">Total Orders</div>
            <div class="value">${totalOrders}</div>
          </div>
          <div class="summary-pill">
            <div class="label">Today's Revenue</div>
            <div class="value revenue-positive">${todayRow ? formatCurrency(todayRow.revenue) : '₹0'}</div>
          </div>
          <div class="summary-pill">
            <div class="label">Today's Orders</div>
            <div class="value">${todayRow ? todayRow.order_count : 0}</div>
          </div>
        `;

        // Table
        tableEl.innerHTML = `
          <table>
            <thead><tr>
              <th>Date</th>
              <th>Orders</th>
              <th>Revenue (Delivered)</th>
              <th>Avg per Order</th>
            </tr></thead>
            <tbody>
              ${rows.map(r => {
                const avg = r.order_count > 0 ? r.revenue / r.order_count : 0;
                const isToday = r.date === today;
                return `<tr class="${isToday ? 'cashflow-today' : ''}">
                  <td>${isToday ? '📅 Today' : r.date} ${isToday ? '<span style="font-size:10px;color:var(--accent);margin-left:6px">TODAY</span>' : ''}</td>
                  <td>${r.order_count}</td>
                  <td class="revenue-positive">${formatCurrency(r.revenue)}</td>
                  <td style="color:var(--text-muted)">${r.revenue > 0 ? formatCurrency(avg) : '—'}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        `;
      } catch (e) {
        tableEl.innerHTML = `<p style="color:var(--text-muted)">${e.message}</p>`;
      }
    }

    // ── Menu ───────────────────────────────────────────
    async function loadMenuAdmin() {
      try {
        const items = await Menu.getAll();
        const el = document.getElementById('menu-table');
        if (!items.length) { el.innerHTML = `<p style="color:var(--text-muted)">No menu items yet</p>`; return; }
        el.innerHTML = `<div class="admin-menu-grid">
          ${items.map(i => `
            <div class="admin-menu-card">
              <div class="admin-menu-card-top">
                <span class="admin-menu-cat">${i.category}</span>
                <span class="admin-menu-id">#${i.id}</span>
              </div>
              <div class="admin-menu-name">${i.name}</div>
              <div class="admin-menu-desc">${i.description || '—'}</div>
              <hr class="admin-menu-divider" />
              <div class="admin-menu-footer">
                <div style="display:flex;align-items:center;gap:10px">
                  <span class="admin-menu-price">${formatCurrency(i.price)}</span>
                  <span class="admin-avail-badge ${i.is_available ? 'avail-yes' : 'avail-no'}">${i.is_available ? 'Available' : 'Unavailable'}</span>
                </div>
                <div style="display:flex;gap:8px">
                  <button class="btn btn-secondary btn-sm" onclick='editMenuItem(${JSON.stringify(i)})'>Edit</button>
                  <button class="btn btn-danger btn-sm" onclick="deleteMenuItem(${i.id})">Delete</button>
                </div>
              </div>
            </div>
          `).join('')}
        </div>`;
      } catch (e) { showToast(e.message, 'error'); }
    }

    // ── Orders ─────────────────────────────────────────
    async function loadOrders() {
      try {
        const orders = await Orders.allOrders();
        const el = document.getElementById('orders-table');
        const statusOptions = ['pending','confirmed','preparing','delivered','cancelled'];
        el.innerHTML = `<div class="table-wrap"><table>
          <tr><th>ID</th><th>Table</th><th>User</th><th>Items</th><th>Total</th><th>Status</th><th>Date</th><th>Update</th></tr>
          ${orders.reverse().map(o => `<tr>
            <td>#${o.id}</td>
            <td><strong>🪑 ${o.table_number}</strong></td>
            <td>User #${o.user_id}</td>
            <td style="font-size:12px;color:var(--text-muted)">
              ${o.items.map(i => `${i.name || '#'+i.menu_item_id} ×${i.quantity}`).join(', ')}
            </td>
            <td>${formatCurrency(o.total_price)}</td>
            <td>${statusBadge(o.status)}</td>
            <td style="font-size:12px;color:var(--text-muted)">${o.created_at ? formatDateTime(o.created_at) : '—'}</td>
            <td><select class="form-select" style="width:130px;padding:5px 8px;font-size:12px" onchange="updateOrderStatus(${o.id}, this.value)">
              ${statusOptions.map(s => `<option value="${s}" ${s===o.status?'selected':''}>${s}</option>`).join('')}
            </select></td>
          </tr>`).join('')}
        </table></div>`;
      } catch (e) { showToast(e.message, 'error'); }
    }

    async function updateOrderStatus(id, status) {
      try {
        await Orders.updateStatus(id, status);
        showToast('Status updated', 'success');
      } catch (e) { showToast(e.message, 'error'); }
    }

    // ── Reservations ───────────────────────────────────
    async function loadReservations() {
      try {
        const rsvps = await Reservations.allReservations();
        const el = document.getElementById('reservations-table');
        const statusOptions = ['pending','confirmed','cancelled'];
        el.innerHTML = `<div class="table-wrap"><table>
          <tr><th>ID</th><th>Table</th><th>User</th><th>Date</th><th>Time</th><th>Guests</th><th>Status</th><th>Update</th></tr>
          ${rsvps.reverse().map(r => `<tr>
            <td>#${r.id}</td>
            <td><strong>🪑 ${r.table_number}</strong></td>
            <td>User #${r.user_id}</td>
            <td>${r.date}</td>
            <td>${r.time}</td>
            <td>👥 ${r.guests}</td>
            <td>${statusBadge(r.status)}</td>
            <td><select class="form-select" style="width:120px;padding:5px 8px;font-size:12px" onchange="updateReservationStatus(${r.id}, this.value)">
              ${statusOptions.map(s => `<option value="${s}" ${s===r.status?'selected':''}>${s}</option>`).join('')}
            </select></td>
          </tr>`).join('')}
        </table></div>`;
      } catch (e) { showToast(e.message, 'error'); }
    }

    async function updateReservationStatus(id, status) {
      try {
        await Reservations.updateStatus(id, status);
        showToast('Status updated', 'success');
      } catch (e) { showToast(e.message, 'error'); }
    }

    // ── Menu Modal ─────────────────────────────────────
    function openMenuModal(item = null) {
      document.getElementById('m-id').value = item ? item.id : '';
      document.getElementById('m-name').value = item ? item.name : '';
      document.getElementById('m-category').value = item ? item.category : '';
      document.getElementById('m-price').value = item ? item.price : '';
      document.getElementById('m-desc').value = item ? (item.description || '') : '';
      document.getElementById('m-img').value = item ? (item.image_url || '') : '';
      document.getElementById('m-avail').checked = item ? item.is_available : true;
      document.getElementById('modal-title').textContent = item ? 'Edit Menu Item' : 'Add Menu Item';
      document.getElementById('menu-modal').classList.add('open');
    }
    function editMenuItem(item) { openMenuModal(item); }
    function closeMenuModal() { document.getElementById('menu-modal').classList.remove('open'); }

    async function saveMenuItem() {
      const id = document.getElementById('m-id').value;
      const data = {
        name: document.getElementById('m-name').value,
        category: document.getElementById('m-category').value,
        price: parseFloat(document.getElementById('m-price').value),
        description: document.getElementById('m-desc').value,
        image_url: document.getElementById('m-img').value || null,
        is_available: document.getElementById('m-avail').checked,
      };
      const btn = document.getElementById('modal-save-btn');
      btn.disabled = true; btn.textContent = 'Saving…';
      try {
        if (id) await Menu.update(id, data);
        else await Menu.create(data);
        showToast(id ? 'Item updated' : 'Item created', 'success');
        closeMenuModal();
        loadMenuAdmin();
      } catch (e) { showToast(e.message, 'error'); }
      btn.disabled = false; btn.textContent = 'Save Item';
    }

    async function deleteMenuItem(id) {
      if (!confirm('Delete this item?')) return;
      try {
        await Menu.delete(id);
        showToast('Item deleted', 'success');
        loadMenuAdmin();
      } catch (e) { showToast(e.message, 'error'); }
    }

    // ── New Order Modal ────────────────────────────────
    let noMenuItems = [];
    let noQtys = {};

    async function openNewOrderModal() {
      noQtys = {};
      document.getElementById('no-table').value = '';
      document.getElementById('no-search').value = '';
      document.getElementById('new-order-modal').classList.add('open');
      const listEl = document.getElementById('no-menu-list');
      listEl.innerHTML = '<div class="spinner"></div>';
      try {
        noMenuItems = (await Menu.getAll()).filter(i => i.is_available);
        renderOrderItems();
      } catch (e) {
        listEl.innerHTML = `<p style="color:var(--text-muted)">${e.message}</p>`;
      }
    }

    function renderOrderItems() {
      const listEl = document.getElementById('no-menu-list');
      listEl.innerHTML = noMenuItems.map(item => `
        <div id="no-item-${item.id}" class="menu-box-item">
          <div>
            <div style="font-weight:600;font-size:14px;color:var(--text)">${item.name}</div>
            <div style="font-size:12px;color:var(--accent)">${item.category} · <span style="color:var(--text-muted)">${formatCurrency(item.price)}</span></div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <button class="qty-btn" onclick="noChangeQty(${item.id}, -1)" style="width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--surface-alt,#222);cursor:pointer;font-size:16px">−</button>
            <span style="min-width:20px;text-align:center;font-weight:600" id="no-qty-${item.id}">${noQtys[item.id] || 0}</span>
            <button class="qty-btn" onclick="noChangeQty(${item.id}, 1)" style="width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--surface-alt,#222);cursor:pointer;font-size:16px">+</button>
          </div>
        </div>
      `).join('');
      updateOrderSummary();
    }
    
    function filterNewOrderMenu() {
      const q = document.getElementById('no-search').value.toLowerCase();
      noMenuItems.forEach(item => {
        const el = document.getElementById(`no-item-${item.id}`);
        if (el) {
          el.style.display = item.name.toLowerCase().includes(q) ? 'flex' : 'none';
        }
      });
    }

    function noChangeQty(itemId, delta) {
      noQtys[itemId] = Math.max(0, (noQtys[itemId] || 0) + delta);
      const el = document.getElementById(`no-qty-${itemId}`);
      if (el) el.textContent = noQtys[itemId];
      updateOrderSummary();
    }

    function updateOrderSummary() {
      let total = 0;
      const selected = [];
      noMenuItems.forEach(item => {
        const qty = noQtys[item.id] || 0;
        if (qty > 0) {
          total += item.price * qty;
          selected.push(`${item.name} ×${qty}`);
        }
      });
      document.getElementById('no-total').textContent = formatCurrency(total);
      document.getElementById('no-selected-items').textContent = selected.length ? selected.join(', ') : 'No items selected';
    }

    function closeNewOrderModal() {
      document.getElementById('new-order-modal').classList.remove('open');
    }

    async function submitNewOrder() {
      const tableNumber = parseInt(document.getElementById('no-table').value);
      if (!tableNumber || tableNumber < 1 || tableNumber > 20) {
        showToast('Enter a valid table number (1–20)', 'error'); return;
      }
      const items = noMenuItems
        .filter(item => (noQtys[item.id] || 0) > 0)
        .map(item => ({ menu_item_id: item.id, name: item.name, quantity: noQtys[item.id], price: item.price }));
      if (!items.length) { showToast('Add at least one item', 'error'); return; }

      const btn = document.getElementById('no-submit-btn');
      btn.disabled = true; btn.textContent = 'Placing…';
      try {
        await Orders.create(items, tableNumber);
        showToast(`Order placed for Table ${tableNumber} ✅`, 'success');
        closeNewOrderModal();
        loadOrders();
      } catch (e) { showToast(e.message, 'error'); }
      btn.disabled = false; btn.textContent = 'Place Order';
    }

    // ── New Reservation Modal ──────────────────────────
    function openNewReservationModal() {
      document.getElementById('nr-date').value = '';
      document.getElementById('nr-time').value = '';
      document.getElementById('nr-guests').value = '';
      document.getElementById('nr-table').value = '';
      document.getElementById('new-res-modal').classList.add('open');
    }

    function closeNewReservationModal() {
      document.getElementById('new-res-modal').classList.remove('open');
    }

    async function submitNewReservation() {
      const date = document.getElementById('nr-date').value;
      const time = document.getElementById('nr-time').value;
      const guests = parseInt(document.getElementById('nr-guests').value);
      const tableNumber = parseInt(document.getElementById('nr-table').value);
      if (!date || !time || !guests || !tableNumber) { showToast('Fill in all fields', 'error'); return; }
      if (tableNumber < 1 || tableNumber > 20) { showToast('Table must be 1–20', 'error'); return; }

      const btn = document.getElementById('nr-submit-btn');
      btn.disabled = true; btn.textContent = 'Booking…';
      try {
        await Reservations.create(date, time, guests, tableNumber);
        showToast(`Table ${tableNumber} reserved ✅`, 'success');
        closeNewReservationModal();
        loadReservations();
      } catch (e) { showToast(e.message, 'error'); }
      btn.disabled = false; btn.textContent = 'Book Table';
    }

    function initNavbar() {
      const user = JSON.parse(localStorage.getItem('user') || 'null');
      const area = document.getElementById('nav-user-area');
      if (user) {
        area.innerHTML = `<div class="user-pill"><span>${user.name.split(' ')[0]}</span><span class="user-role">${user.role}</span></div>`;
      } else {
        area.innerHTML = `<a href="../login.html" class="btn btn-sm btn-primary">Sign In</a>`;
      }
    }
  </script>
</body>
</html>
