<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart — CaféMaven</title>
  <link rel="stylesheet" href="../styles/base.css" />
  <link rel="stylesheet" href="../styles/navbar.css" />
  <link rel="stylesheet" href="../styles/cart.css" />
</head>
<body>
  <div id="toast-container"></div>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-brand">Café<span>Maven</span></a>
      <div class="navbar-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="menu.html" class="nav-link">Menu</a>
        <a href="booking.html" class="nav-link">Reserve</a>
        <a href="orders.html" class="nav-link">My Orders</a>
      </div>
      <div class="navbar-right">
        <button class="cart-btn" onclick="window.location.href='cart.html'">🛒 Cart <span id="cart-badge"></span></button>
        <div id="nav-user-area"></div>
      </div>
    </div>
  </nav>

  <div class="page-content container">
    <h1 class="page-title">Your Cart</h1>
    <p class="page-subtitle">Review your order before placing it</p>
    <div id="cart-content"></div>
  </div>

  <script src="../scripts/api.js"></script>
  <script src="../scripts/auth.js"></script>
  <script src="../scripts/utils.js"></script>
  <script>
    initNavbar();

    function render() {
      const cart = CartStore.get();
      const content = document.getElementById('cart-content');

      if (!cart.length) {
        content.innerHTML = `
          <div class="empty-state">
            <div style="font-size:3rem;margin-bottom:16px">🛒</div>
            <h3>Your cart is empty</h3>
            <p style="margin-top:6px;margin-bottom:20px">Add items from the menu to get started</p>
            <a href="menu.html" class="btn btn-primary">Browse Menu</a>
          </div>`;
        return;
      }

      const itemsHtml = cart.map(item => `
        <div class="cart-item">
          <div class="cart-item-img">
            ${item.image_url ? `<img src="${item.image_url}" alt="${item.name}" />` : '🍽'}
          </div>
          <div class="cart-item-info">
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-price">${formatCurrency(item.price)} each</div>
          </div>
          <div class="qty-control">
            <button class="qty-btn" onclick="changeQty(${item.id}, ${item.qty - 1})">−</button>
            <span class="qty-num">${item.qty}</span>
            <button class="qty-btn" onclick="changeQty(${item.id}, ${item.qty + 1})">+</button>
          </div>
          <div style="min-width:80px;text-align:right;font-weight:600">${formatCurrency(item.price * item.qty)}</div>
          <button class="btn btn-danger btn-sm" onclick="removeItem(${item.id})">✕</button>
        </div>
      `).join('');

      content.innerHTML = `
        <div class="cart-layout">
          <div class="card">
            <h3 style="margin-bottom:16px">Items (${CartStore.count()})</h3>
            ${itemsHtml}
          </div>
          <div class="card" style="position:sticky;top:calc(var(--nav-h)+16px)">
            <h3 style="margin-bottom:16px">Order Summary</h3>
            <div class="cart-summary-row"><span>Subtotal</span><span>${formatCurrency(CartStore.total())}</span></div>
            <div class="cart-summary-row"><span>Tax (5%)</span><span>${formatCurrency(CartStore.total() * 0.05)}</span></div>
            <div class="cart-summary-row total"><span>Total</span><span>${formatCurrency(CartStore.total() * 1.05)}</span></div>

            <div class="form-group" style="margin-top:20px">
              <label class="form-label" style="font-size:13px">🪑 Table Number <span style="color:var(--text-muted);font-size:11px">(1–20, required)</span></label>
              <input id="table-number" type="number" class="form-input" min="1" max="20" placeholder="Enter your table number" style="margin-top:6px" />
            </div>

            <button class="btn btn-primary btn-full" style="margin-top:12px" id="checkout-btn" onclick="checkout()">Place Order</button>
            <button class="btn btn-secondary btn-full" style="margin-top:8px" onclick="CartStore.clear();render()">Clear Cart</button>
          </div>
        </div>`;
    }

    function changeQty(id, qty) { CartStore.updateQty(id, qty); render(); }
    function removeItem(id) { CartStore.remove(id); render(); }

    async function checkout() {
      if (!isLoggedIn()) {
        showToast('Please sign in to place an order', 'error');
        setTimeout(() => window.location.href = 'login.html', 1000);
        return;
      }

      const tableInput = document.getElementById('table-number');
      const tableNumber = parseInt(tableInput ? tableInput.value : '0');
      if (!tableNumber || tableNumber < 1 || tableNumber > 20) {
        showToast('Please enter a valid table number (1–20)', 'error');
        return;
      }

      const cart = CartStore.get();
      const btn = document.getElementById('checkout-btn');
      btn.disabled = true; btn.textContent = 'Placing order…';

      try {
        const items = cart.map(i => ({
          menu_item_id: i.id,
          name: i.name,
          quantity: i.qty,
          price: i.price
        }));

        await Orders.create(items, tableNumber);
        CartStore.clear();
        showToast(`Order placed for Table ${tableNumber}! 🎉`, 'success');
        setTimeout(() => window.location.href = 'orders.html', 1200);
      } catch (e) {
        showToast(e.message, 'error');
        btn.disabled = false; btn.textContent = 'Place Order';
      }
    }

    function initNavbar() {
      const user = JSON.parse(localStorage.getItem('user') || 'null');
      const area = document.getElementById('nav-user-area');
      if (user) {
        area.innerHTML = `<div class="user-pill"><span>${user.name.split(' ')[0]}</span><span class="user-role">${user.role}</span></div>
          <button class="btn btn-sm btn-secondary" onclick="logout()">Out</button>`;
      } else {
        area.innerHTML = `<a href="login.html" class="btn btn-sm btn-primary">Sign In</a>`;
      }
      updateCartBadge();
    }

    render();
  </script>
</body>
</html>
